<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Promfter Maker - Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&amp;family=JetBrains+Mono&amp;family=Nanum+Pen+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .font-handwritten { font-family: 'Nanum Pen Script', cursive; }
        .focus-ring-active { outline: 3px solid #ffd479; outline-offset: 2px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #131318; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3a3a48; border-radius: 10px; }
        
        /* Subtle atmospheric background effect */
        .bg-mesh {
            background-color: #131318;
            background-image: 
                radial-gradient(at 0% 0%, rgba(57, 99, 128, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(141, 205, 255, 0.05) 0px, transparent 50%);
        }
    </style>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#5b4300",
                        "inverse-on-surface": "#303035",
                        "secondary": "#8dcdff",
                        "surface-container-low": "#1b1b20",

                        "inverse-primary": "#396380",

                        "on-secondary-fixed": "#001e30",
                        "primary-fixed": "#c9e6ff",
                        "surface-container-highest": "#35343a",

                        "on-error": "#690005",
                        "on-tertiary": "#402d00",
                        "surface-dim": "#131318",
                        "on-secondary-fixed-variant": "#004b70",
                        "secondary-fixed": "#cae6ff",
                        "secondary-container": "#036c9e",
                        "surface-tint": "#a2cbed",
                        "secondary-fixed-dim": "#8dcdff",
                        "on-secondary": "#00344f",
                        "on-primary-fixed": "#001e2f",
                        "surface-variant": "#35343a",
                        "on-primary-fixed-variant": "#1e4b67",
                        "on-tertiary-fixed": "#261a00",
                        "on-background": "#e4e1e9",
                        "surface-container-lowest": "#0e0e13",
                        "primary-container": "#b3ddff",
                        "background": "#131318",
                        "surface-bright": "#39383e",
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#a2cbed",
                        "on-secondary-container": "#cde7ff",
                        "surface": "#131318",
                        "tertiary": "#fff2e0",
                        "inverse-surface": "#e4e1e9",
                        "tertiary-fixed-dim": "#eac168",
                        "tertiary-container": "#fdd277",
                        "surface-container-high": "#2a292f",

                        "surface-container": "#1f1f24"

                    "spacing": {
                        "gutter": "24px",
                        "panel-padding": "24px",
                        "margin": "32px",
                        "control-height": "50px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["Bricolage Grotesque"],
                        "body-md": ["Bricolage Grotesque"],
                        "body-lg": ["Bricolage Grotesque"],
                        "headline-md": ["Bricolage Grotesque"],
                        "code-sm": ["JetBrains Mono"],
                        "headline-sm": ["Bricolage Grotesque"],
                        "label-md": ["Bricolage Grotesque"]

                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-4 bg-mesh overflow-hidden">
<!-- Background Animation Shader -->

<!-- Settings Overlay / Modal -->
<div class="relative w-full max-w-2xl bg-[#16161d] border border-[#3a3a48] rounded-[16px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Header -->
<header class="flex items-center justify-between px-gutter py-6 border-b border-[#3a3a48]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary text-3xl">settings</span>
<h1 class="font-display-lg text-display-lg tracking-tight">Promfter Maker</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<div class="p-panel-padding space-y-10 max-h-[716px] overflow-y-auto custom-scrollbar">
<!-- Font Family Section -->
<section class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">font_download</span>
<h2 class="font-handwritten text-3xl text-on-surface">글꼴 설정</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Handwritten (Selected) -->
<button class="flex items-center justify-between h-[50px] px-6 bg-[#1f1f2a] border border-[#6b6b82] rounded-lg focus-ring-active transition-all group">
<span class="font-handwritten text-2xl text-secondary">Handwritten</span>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- System Sans -->
<button class="flex items-center justify-between h-[50px] px-6 bg-[#1f1f2a] border border-[#6b6b82] rounded-lg hover:border-secondary transition-all group">
<span class="font-body-md text-on-surface-variant">System Sans</span>
<div class="w-5 h-5 rounded-full border-2 border-[#6b6b82]"></div>
</button>
</div>
</section>
<!-- Text Size Section -->
<section class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">format_size</span>
<h2 class="font-handwritten text-3xl text-on-surface">글자 크기</h2>
</div>
<div class="flex p-1 bg-[#131318] border border-[#3a3a48] rounded-xl">
<button class="flex-1 h-[50px] font-display-lg text-xl text-on-surface-variant hover:text-primary transition-colors">S</button>
<div class="w-[1px] h-8 self-center bg-[#3a3a48]"></div>
<button class="flex-1 h-[50px] font-display-lg text-2xl text-secondary focus-ring-active bg-[#1f1f2a] rounded-lg">M</button>
<div class="w-[1px] h-8 self-center bg-[#3a3a48]"></div>
<button class="flex-1 h-[50px] font-display-lg text-3xl text-on-surface-variant hover:text-primary transition-colors">L</button>
</div>
</section>
<!-- Language Section -->
<section class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">translate</span>
<h2 class="font-handwritten text-3xl text-on-surface">언어</h2>
</div>
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
<!-- KR Selected -->
<button class="h-[50px] flex items-center justify-center font-display-lg bg-[#1f1f2a] border border-[#6b6b82] rounded-lg focus-ring-active text-secondary">
                        KR
                    </button>
<button class="h-[50px] flex items-center justify-center font-display-lg bg-[#1f1f2a] border border-[#6b6b82] rounded-lg text-on-surface-variant hover:border-secondary hover:text-primary transition-all">
                        EN
                    </button>
<button class="h-[50px] flex items-center justify-center font-display-lg bg-[#1f1f2a] border border-[#6b6b82] rounded-lg text-on-surface-variant hover:border-secondary hover:text-primary transition-all">
                        JA
                    </button>
<button class="h-[50px] flex items-center justify-center font-display-lg bg-[#1f1f2a] border border-[#6b6b82] rounded-lg text-on-surface-variant hover:border-secondary hover:text-primary transition-all">
                        ZH
                    </button>
<button class="h-[50px] flex items-center justify-center font-display-lg bg-[#1f1f2a] border border-[#6b6b82] rounded-lg text-on-surface-variant hover:border-secondary hover:text-primary transition-all">
                        VI
                    </button>
</div>
</section>
<!-- Aesthetic Placeholder / Brand Element -->
<div class="relative rounded-xl border border-[#3a3a48] overflow-hidden group aspect-[21/9]">
<div class="absolute inset-0 bg-gradient-to-t from-[#16161d] to-transparent z-10"></div>
<div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-110" data-alt="A high-contrast cinematic digital painting of a futuristic workstation in a dark room. The screen glows with complex code and neural networks in shades of cool blue and amber. Sharp geometric lines and brutalist architectural details fill the background, illuminated by soft rim lighting. The overall mood is focused, clinical, and high-tech, matching the Promfter Maker aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAxQIYiAsVt_xnGVnwkWEPJCzAlGeAMA-esKPbfTQBmtvBfCeIQclDRKOmwGg4G8Qd1jJPr0hHX5_QMrNV-kMxsDF4cATABod3LvzItWA3noZa9PFAL1KP5HdbU7YC9yxeQa_AVpM6PTYBdBzlqNZiwTAgF991pJpaoxZoSW8784yXy2f3jOQTn2PLQEXJJw8a-2wGckXkf-CYF6DgyP9oglojeuRCCilRY0cbZobQS9iqFDguec0bjlnDlYacStkui2lsiHdJN-GY')"></div>
<div class="absolute bottom-4 left-6 z-20">
<p class="font-handwritten text-2xl text-on-surface">창의적인 프롬프트를 위한 공간</p>
</div>
</div>
</div>
<!-- Footer Actions -->
<footer class="p-gutter flex flex-col sm:flex-row gap-4 border-t border-[#3a3a48] bg-[#1b1b20]">
<button class="flex-1 h-[50px] bg-[#b3ddff] text-[#000000] font-display-lg text-lg rounded-lg hover:bg-[#d6ecff] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                설정 저장
            </button>
<button class="flex-1 h-[50px] bg-[#1f1f2a] border border-[#6b6b82] text-[#f5f5f7] font-display-lg text-lg rounded-lg hover:bg-[#2a2a38] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">restart_alt</span>
                초기화
            </button>
</footer>
</div>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Toggle state logic for demonstration
        const langButtons = document.querySelectorAll('section:last-of-type button');
        langButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                langButtons.forEach(b => {
                    b.classList.remove('focus-ring-active', 'text-secondary');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('focus-ring-active', 'text-secondary');
                btn.classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
